name: Debug

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Check registered commands & bot status
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          script: |
            cd ${{ secrets.VPS_DEPLOY_PATH }}
            TOKEN=$(grep DISCORD_BOT_TOKEN .env | cut -d= -f2)
            echo "=== Container status ==="
            docker compose ps
            echo "=== Last 30 log lines ==="
            docker compose logs --tail 30
            echo "=== setup_hook debug file ==="
            docker compose exec -T bot cat /tmp/setup_hook.txt 2>&1 || echo "(file not found)"
            echo "=== Global registered commands ==="
            curl -s -H "Authorization: Bot $TOKEN" \
              https://discord.com/api/v10/applications/1520012720194326606/commands | python3 -m json.tool
